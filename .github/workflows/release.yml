name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*' # This tells GitHub to ONLY run when you push a tag starting with 'v' (like v1.3)

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the action permission to write to your Releases page

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # Automatically writes the changelog based on your commits!
